name: Build AIC8800 PCIe DKMS Debian Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    container:
      image: ubuntu:26.04

    steps:
      - name: Install build tools
        run: |
          apt update
          apt install -y \
            git \
            build-essential \
            devscripts \
            debhelper \
            dh-exec \
            dos2unix \
            fakeroot \
            quilt \
            dkms \
            dh-dkms \
            ca-certificates

      - name: Clone AIC8800 source
        run: |
          git clone https://github.com/radxa-pkg/aic8800.git aic8800

      - name: Prepare source
        run: |
          cd aic8800

          find . \
            \( -name "*.c" -o -name "*.h" -o -name "*.patch" \) \
            -exec dos2unix {} \;

          # PCIe卡不需要USB相关patch
          sed -i '/fix-usb/d' debian/patches/series

          # 禁止编译ARM测试工具
          sed -i '/build-aicrf-test/d' .github/local/Makefile.local || true

          # 禁止aicrf_test目录进入构建
          sed -i '/aicrf_test/d' Makefile || true

          echo "Patch list:"
          cat debian/patches/series

      - name: Install packaging dependencies
        run: |
          apt install -y gcc-aarch64-linux-gnu || true

      - name: Build package
        run: |
          cd aic8800

          dpkg-buildpackage \
            -us \
            -uc \
            -b \
            -d

      - name: Collect packages
        run: |
          mkdir output
          cp ../*.deb output/ || true
          ls -lh output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: aic8800-dkms-package
          path: output/*.deb
