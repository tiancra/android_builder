name: Build AIC8800 DKMS Debian Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    container:
      image: ubuntu:26.04

    steps:
      - name: Install build tools
        run: |
          apt update
          apt install -y \
            git \
            build-essential \
            devscripts \
            debhelper \
            dh-exec \
            dos2unix \
            fakeroot \
            quilt \
            dkms \
            dh-dkms \
            ca-certificates

      - name: Clone AIC8800 source
        run: |
          git clone https://github.com/radxa-pkg/aic8800.git aic8800

      - name: Prepare source
        run: |
          cd aic8800

          # 修复换行符问题
          find . \
            \( -name "*.c" -o -name "*.h" -o -name "*.patch" \) \
            -exec dos2unix {} \;

          # TL-XDN6180 是 PCIe，移除 USB 相关补丁
          sed -i '/fix-usb/d' debian/patches/series

          echo "Patch list:"
          cat debian/patches/series

      - name: Build Debian package
        run: |
          cd aic8800

          dpkg-buildpackage \
            -us \
            -uc \
            -b \
            -d

      - name: Collect packages
        run: |
          mkdir output

          cp ../*.deb output/ || true

          ls -lh output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aic8800-dkms-package
          path: output/*.deb
