name: Build AIC8800 PCIe DKMS Debian Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    container:
      image: ubuntu:26.04

    steps:
      - name: Install tools
        run: |
          apt update
          apt install -y \
            git \
            build-essential \
            devscripts \
            debhelper \
            dh-exec \
            dos2unix \
            fakeroot \
            quilt \
            dkms \
            dh-dkms \
            gcc-aarch64-linux-gnu \
            ca-certificates

      - name: Clone source
        run: |
          git clone https://github.com/radxa-pkg/aic8800.git aic8800

      - name: Prepare
        run: |
          cd aic8800

          find . \
            \( -name "*.c" -o -name "*.h" -o -name "*.patch" \) \
            -exec dos2unix {} \;

          # PCIe 不需要 USB patch
          sed -i '/fix-usb/d' debian/patches/series

          # 禁止 dh_dwz 处理跨架构测试程序
          cat >> debian/rules <<'EOF'

override_dh_dwz:
	@echo "Skip dh_dwz"

EOF

      - name: Build
        run: |
          cd aic8800

          dpkg-buildpackage \
            -us \
            -uc \
            -b \
            -d

      - name: Collect
        run: |
          mkdir output
          find .. -name "*.deb" -exec cp {} output/ \;
          ls -lh output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: aic8800-dkms
          path: output/*.deb
