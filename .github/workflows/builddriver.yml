name: Build AIC8800 PCIe DKMS Debian Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    container:
      image: ubuntu:26.04

    steps:
      - name: Install tools
        run: |
          apt update
          apt install -y \
            git \
            build-essential \
            devscripts \
            debhelper \
            dh-exec \
            dos2unix \
            fakeroot \
            quilt \
            dkms \
            dh-dkms \
            gcc-aarch64-linux-gnu \
            ca-certificates

      - name: Clone source
        run: |
          git clone https://github.com/radxa-pkg/aic8800.git aic8800

      - name: Prepare source
        run: |
          cd aic8800

          find . \
            \( -name "*.c" -o -name "*.h" -o -name "*.patch" \) \
            -exec dos2unix {} \;

          # PCIe 不需要 USB patch
          sed -i '/fix-usb/d' debian/patches/series

          # 删除测试程序安装规则，不删除源码
          rm -f debian/aicrf-test.install

          # 删除测试包定义
          sed -i '/aicrf-test/d' debian/control

          # 创建 override 禁止安装测试工具
          cat >> debian/rules <<'EOF'

override_dh_auto_build:
	dh_auto_build
	rm -f src/tools/aicrf_test/wifi_test
	rm -f src/tools/aicrf_test/bt_test

override_dh_dwz:
	# skip dwz for cross compiled binaries

EOF

      - name: Build deb
        run: |
          cd aic8800

          dpkg-buildpackage \
            -us \
            -uc \
            -b \
            -d

      - name: Collect
        run: |
          mkdir output

          find . -name "*.deb" -exec cp {} output/ \;

          ls -lh output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: aic8800-pcie-dkms
          path: output/*.deb
