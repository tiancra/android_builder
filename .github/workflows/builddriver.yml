name: Build AIC8800 PCIe Debian Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    container:
      image: ubuntu:26.04

    steps:
      - name: Install build dependencies
        run: |
          apt update
          apt install -y \
            git \
            build-essential \
            devscripts \
            debhelper \
            fakeroot \
            quilt \
            dh-dkms \
            dkms \
            ca-certificates

      - name: Clone AIC8800 package source
        run: |
          git clone https://github.com/radxa-pkg/aic8800.git aic8800

      - name: Fix source and patches
        run: |
          cd aic8800

          # 修复 Windows 换行导致的 patch 失败
          find . -type f \
            \( -name "*.c" -o -name "*.h" -o -name "*.patch" \) \
            -exec sed -i 's/\r$//' {} \;

          # PCIe 网卡不需要 USB 补丁
          sed -i '/fix-usb/d' debian/patches/series

          echo "Current patches:"
          cat debian/patches/series

      - name: Build deb package
        run: |
          cd aic8800

          dpkg-buildpackage \
            -us \
            -uc \
            -b

      - name: Collect deb files
        run: |
          mkdir output

          cp *.deb output/ || true
          cp ../*.deb output/ || true

          ls -lh output

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: aic8800-pcie-deb
          path: output/*.deb
