name: Build AIC8800 DKMS Ubuntu 26.04

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    container:
      image: ubuntu:26.04

    steps:
      - name: Install build tools
        run: |
          apt update
          apt install -y \
            git \
            build-essential \
            dkms \
            debhelper \
            fakeroot \
            ca-certificates

      - name: Clone AIC8800 source
        run: |
          git clone https://github.com/radxa-pkg/aic8800.git aic8800

      - name: Check source
        run: |
          find aic8800 -name dkms.conf
          find aic8800 -name Makefile

      - name: Build package
        run: |
          cd aic8800
          dpkg-buildpackage -us -uc -b

      - name: Collect deb
        run: |
          mkdir output
          cp *.deb output/ || true
          ls -lh output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: aic8800-ubuntu2604-dkms
          path: output/*.deb
